# ═══════════════════════════════════════════════════════════════════════
# Nginx Proxy Manager — Custom Nginx Configuration
# ═══════════════════════════════════════════════════════════════════════
#
# Diese Konfiguration im Nginx Proxy Manager unter:
#   Proxy Hosts → ff-goertschach → Edit → Advanced → Custom Nginx Configuration
# einfügen.
#
# WICHTIG: Der NPM setzt standardmäßig eigene Security-Header (X-Frame-Options,
# Content-Security-Policy) die den Service Worker und Push-Benachrichtigungen
# blockieren. Diese Konfiguration überschreibt sie korrekt.
# ═══════════════════════════════════════════════════════════════════════

# X-Frame-Options ENTFERNEN (wird durch CSP frame-ancestors ersetzt)
# NPM setzt diesen Header automatisch — wir überschreiben ihn mit leerem Wert
proxy_hide_header X-Frame-Options;

# Content-Security-Policy: Service Worker, Push-API, RainViewer-iFrame erlauben
proxy_hide_header Content-Security-Policy;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' wss: ws: https://api.open-meteo.com https://api.rainviewer.com; frame-src https://www.rainviewer.com; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'none';" always;

# Service Worker Scope erlauben
add_header Service-Worker-Allowed "/" always;

# Weitere sinnvolle Security-Header
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# WebSocket-Upgrade für Live-Updates (Update-Banner)
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $http_connection;

# Timeouts erhöhen (für lange Uploads und Update-Prozess)
proxy_read_timeout 600s;
proxy_send_timeout 600s;
proxy_connect_timeout 60s;

# Maximale Upload-Größe (Dokumente, Fotos, Backups)
client_max_body_size 500M;
