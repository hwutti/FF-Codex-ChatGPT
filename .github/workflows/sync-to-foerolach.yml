name: Sync code to FF-Foerolach

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo 1
        uses: actions/checkout@v4

      - name: Clone Repo 2
        run: |
          git clone https://x-access-token:${{ secrets.REPO2_TOKEN }}@github.com/hwutti/FF-Foerolach.git repo2

      - name: Sync code into Repo 2 root
        run: |
          rsync -av --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="README.md" \
            --exclude="CONTEXT.md" \
            --exclude="repo2" \
            ./ repo2/

          rm -rf repo2/repo2

      - name: Commit and push to Repo 2
        run: |
          cd repo2
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          git commit -m "$COMMIT_MSG" || echo "No changes to commit"
          git push
